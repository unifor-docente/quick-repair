name: Deploy Azure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "deploy" para confirmar'
        required: true
        type: string

permissions:
  contents: read

env:
  TF_WORKING_DIR: ./infrastructure
  TF_STATE_RESOURCE_GROUP: rg-quickrepair-tfstate
  TF_STATE_CONTAINER: tfstate
  TF_STATE_KEY: quickrepair.tfstate

jobs:
  deploy:
    name: Provision and Deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Bootstrap Terraform remote state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          suffix="$(printf "%s" "${ARM_SUBSCRIPTION_ID}-${GITHUB_REPOSITORY}" | sha256sum | cut -c1-12)"
          storage_account_name="stqr${suffix}"

          az group create \
            --name "$TF_STATE_RESOURCE_GROUP" \
            --location brazilsouth \
            --only-show-errors

          if ! az storage account show \
            --name "$storage_account_name" \
            --resource-group "$TF_STATE_RESOURCE_GROUP" \
            --only-show-errors >/dev/null 2>&1; then
            az storage account create \
              --name "$storage_account_name" \
              --resource-group "$TF_STATE_RESOURCE_GROUP" \
              --location brazilsouth \
              --sku Standard_LRS \
              --min-tls-version TLS1_2 \
              --only-show-errors
          fi

          account_key="$(az storage account keys list \
            --account-name "$storage_account_name" \
            --resource-group "$TF_STATE_RESOURCE_GROUP" \
            --query '[0].value' \
            --output tsv)"

          echo "::add-mask::$account_key"

          az storage container create \
            --name "$TF_STATE_CONTAINER" \
            --account-name "$storage_account_name" \
            --account-key "$account_key" \
            --only-show-errors

          cat > backend.hcl <<EOF
          resource_group_name  = "$TF_STATE_RESOURCE_GROUP"
          storage_account_name = "$storage_account_name"
          container_name       = "$TF_STATE_CONTAINER"
          key                  = "$TF_STATE_KEY"
          access_key           = "$account_key"
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail

          resource_group_name="$(terraform output -raw resource_group_name)"
          function_app_name="$(terraform output -raw function_app_name)"
          function_app_url="$(terraform output -raw function_app_default_hostname)"
          static_web_app_url="$(terraform output -raw static_web_app_url)"
          static_web_app_token="$(terraform output -raw static_web_app_deployment_token)"

          echo "::add-mask::$static_web_app_token"

          {
            echo "resource_group_name=$resource_group_name"
            echo "function_app_name=$function_app_name"
            echo "function_app_url=$function_app_url"
            echo "static_web_app_url=$static_web_app_url"
            echo "static_web_app_token=$static_web_app_token"
          } >> "$GITHUB_OUTPUT"

      - name: Install and build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.tf_outputs.outputs.function_app_name }}
          package: backend
          respect-funcignore: true

      - name: Read Function App key
        id: function_key
        run: |
          set -euo pipefail

          function_key="$(az functionapp keys list \
            --resource-group "${{ steps.tf_outputs.outputs.resource_group_name }}" \
            --name "${{ steps.tf_outputs.outputs.function_app_name }}" \
            --query 'functionKeys.default' \
            --output tsv)"

          if [ -z "$function_key" ]; then
            echo "Nao foi possivel obter a function key default." >&2
            exit 1
          fi

          echo "::add-mask::$function_key"
          echo "function_key=$function_key" >> "$GITHUB_OUTPUT"

      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.tf_outputs.outputs.function_app_url }}/api
          VITE_FUNCTION_KEY: ${{ steps.function_key.outputs.function_key }}
        run: npm ci && npm run build

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.tf_outputs.outputs.static_web_app_token }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Deployment summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Deploy concluido

          - Function App: ${{ steps.tf_outputs.outputs.function_app_url }}
          - Static Web App: ${{ steps.tf_outputs.outputs.static_web_app_url }}

          Para evitar custos, rode o workflow **Destroy Azure** quando terminar a demonstracao.
          EOF
